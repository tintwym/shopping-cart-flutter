name: shopping_cart_flutter
description: Shopping Cart Flutter client for the Spring Boot API.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  go_router: ^16.0.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  app_links: ^6.4.0
  intl: ^0.20.2
  file_picker: ^8.1.7
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: assets/app_icon.png
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#0D9488"
    theme_color: "#0D9488"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/user_logo.svg
    - assets/app_icon.png
